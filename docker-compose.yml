services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5460:5432"
    environment:
      POSTGRES_USER: reviewsense
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: reviewsense
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewsense -d reviewsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    env_file: .env
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: reviewsense
      MONGO_INITDB_ROOT_PASSWORD: devpass
    volumes:
      - mongodata:/data/db

  ml-service:
    build: ./backend/ml-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongo
    environment:
      PORT: 8000
      MONGO_URI: mongodb://reviewsense:devpass@mongo:27017
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MODEL_NAME: ${MODEL_NAME}
      MODEL_STAGE: ${MODEL_STAGE}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  notification-service:
    build: ./backend/notification-service
    ports:
      - "4000:4000"

  main-api:
    build: ./backend/main-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      ml-service:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://reviewsense:devpass@postgres:5432/reviewsense
      MONGO_URI: mongodb://reviewsense:devpass@mongo:27017
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ML_SERVICE_URL: http://ml-service:8000
      NOTIF_SERVICE_URL: http://notification-service:4000

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - main-api

  prometheus:
    image: prom/prometheus:latest
    env_file: .env
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - ml-service
      - main-api

  grafana:
    image: grafana/grafana:latest
    env_file: .env
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  mongodata:
  grafanadata:
