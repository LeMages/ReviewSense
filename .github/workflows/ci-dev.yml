name: CI Dev

on:
  pull_request:
    branches:
      - dev

jobs:
  test-main-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend/main-api
        run: npm ci

      - name: Run tests
        working-directory: backend/main-api
        run: npm test

  test-ml-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: backend/ml-service
        run: uv sync

      - name: Run tests
        working-directory: backend/ml-service
        run: uv run pytest tests/ -v

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-main-api, test-ml-service, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build main-api image
        uses: docker/build-push-action@v6
        with:
          context: backend/main-api
          push: false
          tags: reviewsense/main-api:ci

      - name: Build ml-service image
        uses: docker/build-push-action@v6
        with:
          context: backend/ml-service
          push: false
          tags: reviewsense/ml-service:ci

      - name: Build notification-service image
        uses: docker/build-push-action@v6
        with:
          context: backend/notification-service
          push: false
          tags: reviewsense/notification-service:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: reviewsense/frontend:ci
